# Kitty tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style round
tab_bar_align left
tab_bar_show_new_tab_button no
tab_bar_min_tabs 1
tab_bar_margin_width 0
tab_bar_margin_height 0 0
tab_bar_background #1a1b26
tab_bar_margin_color #1a1b26
tab_title_max_length 28
tab_title_template "{index} {title}"
active_tab_title_template "{fmt.bold}{index} {title}{fmt.nobold}"
active_tab_foreground #c0caf5
active_tab_background #24283b
active_tab_font_style bold
inactive_tab_foreground #9aa5ce
inactive_tab_background #1a1b26
inactive_tab_font_style normal

# Kitty custom keybindings
map ctrl+shift+e launch --location=vsplit
map ctrl+shift+o launch --location=hsplit
map ctrl+shift+x toggle_layout stack
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down
map ctrl+scroll_up change_font_size all +2.0
map ctrl+scroll_down change_font_size all -2.0

# Fonts
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
